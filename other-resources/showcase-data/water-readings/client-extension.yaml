assemble:
    - from: batch
      into: batch

water-readings:
    name: Water Readings Object
    oAuthApplicationHeadlessServer: water-readings-oauth
    type: batch

water-readings-oauth:
    .serviceAddress: localhost:8080
    .serviceScheme: http
    name: Water Readings OAuth Application Headless Server
    scopes:
        - Liferay.Headless.Batch.Engine.everything
        - Liferay.Object.Admin.REST.everything
    type: oAuthApplicationHeadlessServer
