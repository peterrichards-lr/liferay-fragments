assemble:
  - from: batch
    into: batch

company-milestone:
  name: Company Milestone Object
  oAuthApplicationHeadlessServer: company-milestone-oauth
  type: batch

company-milestone-oauth:
  .serviceAddress: localhost:8080
  .serviceScheme: http
  name: Company Milestone OAuth
  scopes:
    - Liferay.Headless.Batch.Engine.everything
    - Liferay.Object.Admin.REST.everything
  type: oAuthApplicationHeadlessServer
