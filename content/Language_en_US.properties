# Descriptions
lfr.content.collection-description=This can be the collection ID, uuid, key or name.
lfr.content.debug-in-error-handler-description=If enabled, then a debugger command will be called when the error handler is called.
lfr.content.display-page-url-description=The URL of the display page. Use {id} to indicate where the web content id should be placed.
lfr.content.google-map-id-description=Map Id specifies which vector map style to use and enables advanced features.
lfr.content.info-template-id-description=The content template Id which contains the HTML template to use.
lfr.content.info-window-close-delay-description=The time in milliseconds that the info window should display for.
lfr.content.info-window-trigger-description=The Click trigger will only work when Navigate on Click is disabled.
lfr.content.marker-fallback-description=If the vocabulary is not found, the default marker will be used.
lfr.content.navigate-on-click-description=If enabled then clicking the marker will navigate to the display page.
lfr.content.open-in-new-tab-description=This only applies when the marker navigates to the display page.
lfr.content.template-fallback-description=If the content template is not found, the default template will be used.
lfr.content.vocabulary-id-description=This is the id of the vocabulary.
lfr.content.asset-library-id-description=The identifier of the asset library which contains the content.
lfr.content.default-page-url-description=This page url will be used when a url cannot be found for the content itself.
lfr.content.site-id-description=The site in which the content resides.
lfr.content.destination-site-id-description=The identifier of the site which hosts the service.

