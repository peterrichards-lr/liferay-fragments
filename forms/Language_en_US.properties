# Labels
lfr.forms.debug-enabled=Debug Enabled
lfr.forms.debug-enabled-description=Enable logging to the browser console for troubleshooting.
lfr.forms.form-populator-mapping=Form Field Mapping
lfr.forms.form-populator-mapping-description=JSON configuration to map URL parameters to form fields.
lfr.forms.retry-count=Retry Count
lfr.forms.retry-count-description=Number of times to attempt populating the form if fields are not immediately found.
lfr.forms.retry-interval=Retry Interval (ms)
lfr.forms.retry-interval-description=Time between retry attempts.
lfr.forms.cookie-name=Cookie Name
lfr.forms.cookie-name-description=The name of the cookie used to store the session ID.
lfr.forms.target-field-name=Target Field Name
lfr.forms.target-field-name-description=The name of the form field to populate with the session ID.
lfr.forms.redirect-url=Redirect URL
lfr.forms.redirect-url-description=The URL to redirect the user to.
lfr.forms.enable-auto-redirect=Enable Auto Redirect
lfr.forms.enable-auto-redirect-description=Automatically redirect after the specified interval.
lfr.forms.redirect-interval-seconds=Redirect Interval (Seconds)
lfr.forms.redirect-interval-seconds-description=How long to wait before redirecting.
lfr.forms.enable-manual-redirect=Enable Manual Redirect
lfr.forms.enable-manual-redirect-description=Show a manual link for the user to click.
lfr.forms.redirect-link-text=Redirect Link Text
lfr.forms.redirect-link-text-description=The text to display for the manual redirect link.
lfr.forms.enable-auto-refresh=Enable Auto Refresh
lfr.forms.enable-auto-refresh-description=Automatically refresh the page after the specified interval.
lfr.forms.refresh-interval-seconds=Refresh Interval (Seconds)
lfr.forms.refresh-interval-seconds-description=How long to wait before refreshing.
lfr.forms.enable-manual-refresh=Enable Manual Refresh
lfr.forms.enable-manual-refresh-description=Show a manual refresh link.
lfr.forms.refresh-link-text=Refresh Link Text
lfr.forms.refresh-link-text-description=The text to display for the manual refresh link.
lfr.forms.refresh-condition-element=Refresh Condition Element
lfr.forms.refresh-condition-element-description=CSS selector for an element that must be present to trigger the refresh (e.g., a success message).
lfr.forms.background-image=Background Image
lfr.forms.background-image-description=The image to display in the masthead background.
lfr.forms.overlay-opacity=Overlay Opacity
lfr.forms.overlay-opacity-description=Transparency of the dark overlay for text legibility.

