<div class="chart-fragment-container chart-container-${fragmentEntryLinkNamespace}" style="--chart-color: ${configuration.chartColor!};">
    <div class="alert alert-info d-none mb-3" id="info-${fragmentEntryLinkNamespace}"></div>
    <div class="alert alert-danger d-none mb-3" id="error-${fragmentEntryLinkNamespace}"></div>
    
    <div class="chart-header mb-4 text-center">
        <h3 class="chart-title" data-lfr-editable-id="chart-title" data-lfr-editable-type="text">Regional Sales Performance</h3>
        <div class="d-none">
            <span data-lfr-editable-id="x-axis-label" data-lfr-editable-type="text">${configuration.xAxisLabel!}</span>
            <span data-lfr-editable-id="y-axis-label" data-lfr-editable-type="text">${configuration.yAxisLabel!}</span>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="chart-${fragmentEntryLinkNamespace}" aria-hidden="true"></canvas>
        <div class="sr-only" id="fallback-table-${fragmentEntryLinkNamespace}">
            <!-- Accessible table data populated here -->
        </div>
    </div>
</div>
