lfr.hero-assets.video-description=Select the video file to be displayed in the banner.
lfr.hero-assets.autoplay-description=Start playing the video automatically when the page loads.
lfr.hero-assets.muted-description=Start the video without sound (often required for autoplay).
lfr.hero-assets.loop-description=Automatically restart the video when it reaches the end.
lfr.hero-assets.controls-label-description=Show or hide the standard video player controls.
lfr.hero-assets.preload-description=Specify how the video should be preloaded (auto, metadata, or none).
lfr.hero-assets.use-custom-control-description=Enable a custom-styled play/pause overlay button.
lfr.hero-assets.control-colour-description=The theme color for the custom video control buttons.
lfr.hero-assets.width-description=The display width of the video element (e.g., 100%).
lfr.hero-assets.height-description=The display height of the video element (e.g., 500px).
lfr.hero-assets.margin-left-description=Left spacing around the video container.
lfr.hero-assets.margin-right-description=Right spacing around the video container.
lfr.hero-assets.margin-top-description=Top spacing around the video container.
lfr.hero-assets.margin-bottom-description=Bottom spacing around the video container.
lfr.hero-assets.enable-debug-description=Show video loading and playback status in the console.
