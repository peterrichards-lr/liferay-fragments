name: Liferay Fragments
run-name: Releasing Liferay Fragments
on:
  push:
    tags:
      - '**'
jobs:
  Build-Fragment-Assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install jq

      - name: Create zip files
        # Ensure it creates the zips using the safe default site scoping
        run: ./create-fragment-zips.sh --all

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          # Automatically mark as pre-release if the tag contains a hyphen (e.g., v1.0.0-rc.1)
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ./zips/fragments/*.zip
            ./zips/language/*.zip
            ./zips/showcase/*.zip
            ./other-resources/*.zip
