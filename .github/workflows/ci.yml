name: Fragment Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Fragments
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Fragment Audit
        run: npm run lint

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Setup LDM (Liferay Docker Manager)
        run: npm install -g liferay-docker-manager

      - name: Provide Dummy LDM License
        # The test runner checks for an XML file in ~/.ldm/common/
        run: |
          mkdir -p ~/.ldm/common/
          echo "<license>Dummy License for CI</license>" > ~/.ldm/common/dummy-license.xml

      - name: Run E2E Test Suite
        run: ./scripts/test-runner.sh

      - name: Upload Test Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-artifacts
          path: |
            e2e-tests/playwright-report/
            e2e-tests/playwright_output.log
            docs/test-results/
            e2e-tests/snapshots/
          retention-days: 7
