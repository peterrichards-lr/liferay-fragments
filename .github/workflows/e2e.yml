name: E2E Integration Tests

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

# Optimize resources by canceling redundant runs for the same branch/PR
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  LDM_REPO: peterrichards-lr/liferay-docker-manager

jobs:
  playwright-ldm:
    name: Playwright Tests (LDM)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Install LDM Binary (latest)
        run: |
          # Always resolve the most recent release (stable OR pre-release) so CI
          # stays in sync with local development without any manual version pinning.
          RELEASE=$(curl -s "https://api.github.com/repos/${{ env.LDM_REPO }}/releases?per_page=1")
          LDM_VERSION=$(echo "$RELEASE" | jq -r '.[0].tag_name')
          DOWNLOAD_URL=$(echo "$RELEASE" | jq -r '.[0].assets[] | select(.name == "ldm-linux") | .browser_download_url')
          echo "Installing LDM ${LDM_VERSION} from: $DOWNLOAD_URL"
          wget -q -O ldm-linux "$DOWNLOAD_URL"
          chmod +x ldm-linux
          sudo mv ldm-linux /usr/local/bin/ldm
          ldm version --no-color --no-unicode

      - name: Provide Dummy LDM License
        # The test runner checks for an XML file in ~/.ldm/common/ to authorize DXP startup
        run: |
          mkdir -p ~/.ldm/common/
          echo "<license>Dummy License for CI</license>" > ~/.ldm/common/dummy-license.xml

      - name: Run E2E Test Suite
        # test-runner.sh handles building ZIPs, provisioning LDM, deploying, and triggering Playwright
        run: ./scripts/test-runner.sh

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-artifacts
          path: |
            e2e-tests/playwright-report/
            e2e-tests/playwright_output.log
            docs/test-results/
            e2e-tests/snapshots/
          retention-days: 7
